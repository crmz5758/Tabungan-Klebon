<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tabungan Pemuda Pemudi Dusun Klebon</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Tabungan Pemuda Pemudi</h1>
    <h2>Dusun Klebon</h2>
    <p id="update"></p>
</header>


<div class="container">

    <div class="summary">

        <div class="box">
            <h3>Total Penabung</h3>
            <b id="jumlah"></b>
        </div>

        <div class="box">
            <h3>Total Saldo</h3>
            <b id="saldo"></b>
        </div>

    </div>


    <input 
    type="text" 
    id="search" 
    placeholder="Cari nama..."
    >


    <table>

        <thead>
            <tr>
                <th>No</th>
                <th>Nama</th>
                <th>Nominal</th>
            </tr>
        </thead>

        <tbody id="data"></tbody>

    </table>


</div>


<script src="script.js"></script>

</body>
</html>
