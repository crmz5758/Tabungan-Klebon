<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tabungan Pemuda Pemudi Dusun Klebon</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <h1>Tabungan Pemuda Pemudi</h1>
    <h2>Dusun Klebon</h2>

    <div class="update">
        Update terakhir : <span id="update"></span>
    </div>

</header>



<main class="container">


<section class="cards">


<div class="card">

    <div class="icon">
        👥
    </div>

    <div>
        <p>Total</p>
        <h2 id="jumlah"></h2>
    </div>

</div>



<div class="card">

    <div class="icon">
        💰
    </div>

    <div>
        <p>Total Saldo</p>
        <h2 id="saldo"></h2>
    </div>

</div>


</section>



<div class="search-box">

<input 
type="text"
id="search"
placeholder="Cari nama..."
>

</div>




<div class="table-card">

<table>


<thead>

<tr>
<th>No</th>
<th>Nama</th>
<th>Nominal</th>
</tr>

</thead>


<tbody id="data">

</tbody>


</table>

</div>


</main>



<footer>

© 2026 Pemuda Pemudi Dusun Klebon

</footer>


<script src="script.js"></script>

</body>

</html>
